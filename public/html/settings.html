<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title" tr>Settings</title>
    <link rel="icon" href="/img/logo.png">
    <link rel="stylesheet" href="/css/settings.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/marked.min.js"></script>
    <script src="/js/qrcode.min.js"></script>
</head>

<body>
    <div class="tabs">
        <button class="tab-button active" data-tab="default">OSR</button>
        <button class="tab-button" data-tab="llm">LLM</button>
        <button class="tab-button" data-tab="comfyui">T2I</button>
        <button class="tab-button" data-tab="cards">CARDS</button>
        <button class="tab-button" data-tab="qr">QR</button>
        <button class="tab-button" data-tab="api">API</button>
    </div>

    <div class="tab-content active" id="default-tab">
        <div class="container">
            <form id="settingsForm">
                <div class="form-group">
                    <label tr>Work Mode</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="modeUdp" name="mode" value="udp" checked>
                            <label for="modeUdp" tr>UDP Mode</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="modeSerial" name="mode" value="serial">
                            <label for="modeSerial" tr>Serial Mode</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="udpUrl" tr>UDP Address</label>
                    <input type="text" id="udpUrl" name="udpUrl" placeholder="http://192.168.4.1:8000">
                </div>

                <div class="form-group">
                    <label for="serialDevice" tr>Serial Device</label>
                    <select id="serialDevice" name="serialDevice">
                        <option value="" tr>Please select a serial device</option>
                    </select>
                </div>

                <div class="form-group">
                    <div class="radio-option">
                        <input type="checkbox" id="joystickControl" name="joystickControl" disabled>
                        <label for="joystickControl" tr>Joystick Control (for testing)</label>
                    </div>
                </div>

                <button type="submit" tr>Save Settings</button>
            </form>
        </div>
    </div>

    <div class="tab-content" id="llm-tab">
        <div class="container" style="margin-bottom: 10px;">
            <form id="llmConfigForm">
                <div class="form-group">
                    <label for="baseUrl" tr>Base URL</label>
                    <input type="text" id="baseUrl" name="baseUrl" placeholder="http://124.0.0.1:11434/v1">
                </div>
                <div class="form-group">
                    <label for="apiKey" tr>API Key</label>
                    <input type="password" id="apiKey" name="apiKey" placeholder="sk-">
                </div>
                <div class="form-group">
                    <label for="model" tr>Model</label>
                    <input type="text" id="model" name="model" placeholder="glm-4.7-flash">
                </div>
                <button type="submit" tr>Save Settings</button>
            </form>
        </div>
        <a href="/" style="display: block; text-align: center;" tr>Go to Chat ></a>
    </div>

    <div class="tab-content" id="comfyui-tab">
        <div class="container" style="margin-bottom: 10px;">
            <form id="comfyuiConfigForm">
                <div class="form-group">
                    <label for="comfyUrl" tr>ComfyUI URL</label>
                    <input type="text" id="comfyUrl" name="url" placeholder="http://127.0.0.1:8188">
                </div>
                <div class="form-group">
                    <label tr>Image Aspect Ratio</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="aspectPortrait" name="aspectRatio" value="portrait" checked>
                            <label for="aspectPortrait" tr>Portrait</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="aspectLandscape" name="aspectRatio" value="landscape">
                            <label for="aspectLandscape" tr>Landscape</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="aspectSquare" name="aspectRatio" value="square">
                            <label for="aspectSquare" tr>Square</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label tr>Model Type</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="comfyTypeSdxl" name="comfyType" value="sdxl">
                            <label for="comfyTypeSdxl">SDXL / Illustrious</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="comfyTypeZit" name="comfyType" value="zit">
                            <label for="comfyTypeZit">ZIT</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="comfyDiffusion" tr>Diffusion Model</label>
                    <input type="text" id="comfyDiffusion" name="diffusion"
                        placeholder="z_image_turbo_bf16.safetensors">
                </div>
                <div class="form-group clip-vae-group">
                    <label for="comfyClip" tr>CLIP Model</label>
                    <input type="text" id="comfyClip" name="clip" placeholder="qwen_3_4b.safetensors">
                </div>
                <div class="form-group clip-vae-group">
                    <label for="comfyVae" tr>VAE Model</label>
                    <input type="text" id="comfyVae" name="vae" placeholder="ae.safetensors">
                </div>
                <button type="submit" tr>Save Settings</button>
            </form>
        </div>
        <a href="#" id="clear-t2i-cache" style="display: block; text-align: center;" tr>Clear Image Cache</a>
    </div>

    <div class="tab-content" id="cards-tab" style="width: 100%;">
        <div class="container" style="height: calc(100vh - 180px);">
            <div class="cards-tab-header">
                <input type="text" id="card-name-input" placeholder="" style="flex: 1;">
                <button id="new-card-button" style="width: auto;">
                    <svg>
                        <use xlink:href="/img/icons.svg?v=140#icon-add"></use>
                    </svg>
                </button>
                <button id="import-card-button" style="width: auto;">
                    <svg>
                        <use xlink:href="/img/icons.svg?v=140#icon-import"></use>
                    </svg>
                </button>
            </div>
            <div id="cards-list"></div>
        </div>
    </div>

    <div class="tab-content" id="qr-tab" style="min-width: auto; width: auto;">
        <div class="container">
            <div id="qr-code"></div>
            <div id="qr-url" style="user-select: text;"></div>
        </div>
    </div>

    <div class="tab-content" id="api-tab" style="width: 100%;">
        <div class="container">
            <div id="api-doc-content" style="user-select: text;"></div>
        </div>
    </div>
</body>

<script>
    // Send request and show bubble message
    const fetchWithToast = async (url, options = {}, successMsg, errorMsg) => {
        try {
            const response = await fetch(url, options);
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.detail || response.statusText);
            }
            const data = await response.json().catch(() => ({}));
            if (successMsg) toast.show(i18n.tr(successMsg), 'success');
            return data;
        } catch (error) {
            const msg = errorMsg ? i18n.tr(errorMsg) : i18n.tr("Operation failed");
            toast.show(`${msg}: ${error.message}`, 'error');
            throw error;
        }
    };

    // Get current settings
    const getConfig = async () =>
        fetchWithToast(`/api/config?t=${Date.now()}`, {}, null, "Failed to get current settings");

    // Update joystick control checkbox state
    const updateJoystickCheckboxState = async (mode) => {
        const c = document.getElementById('joystickControl');
        if (mode === 'serial') {
            c.disabled = false;
            try { c.checked = (await (await fetch('/api/devices/joystick')).json()).running; }
            catch { c.checked = false; }
        } else {
            c.disabled = true;
            c.checked = false;
            try { await fetch('/api/devices/joystick/stop', { method: 'POST' }); } catch { }
        }
    };

    // Escape HTML
    const escapeHtml = (t) => (div => (div.textContent = t, div.innerHTML))(document.createElement('div'));

    // Generate card name
    const generateCardName = () => {
        const d = new Date();
        return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}${String(d.getSeconds()).padStart(2, '0')}${String(d.getMilliseconds()).padStart(3, '0')}`;
    };

    // Check card data structure
    const isValidStructure = (obj) => {
        if (typeof obj !== 'object' || !obj || !Object.keys(obj).length) return false;
        return Object.values(obj).every(item =>
            item && typeof item === 'object' &&
            typeof item.system_prompt === 'string' &&
            (item.context === undefined || (Array.isArray(item.context) && item.context.length &&
                item.context.every(ctx =>
                    ctx && typeof ctx === 'object' &&
                    (ctx.role === 'assistant' || ctx.role === 'user') &&
                    typeof ctx.content === 'string' && ctx.content.trim()
                )
            ))
        );
    };
</script>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await i18n.init("settings", i18n.getBrowserLanguage());
        toast.init();
    });

    // Tab page switching
    document.querySelectorAll('.tab-button').forEach(b => b.addEventListener('click', function () {
        const t = this.getAttribute('data-tab');
        document.querySelectorAll('.tab-button,.tab-content').forEach(e => e.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(`${t}-tab`).classList.add('active');
    }));
</script>

<script>
    async function loadSettings() {
        try {
            const settings = await getConfig();
            if (settings.udp_url) document.getElementById('udpUrl').value = settings.udp_url;
            if (settings.mode) {
                document.querySelector(`input[name="mode"][value="${settings.mode}"]`).checked = true;
                await updateJoystickCheckboxState(settings.mode);
            }
        } catch (error) {
            console.error('Failed to load settings:', error);
        }
    }

    async function loadSerialDevices() {
        try {
            const response = await fetch('/api/devices/serial');
            const data = await response.json();
            const select = document.getElementById('serialDevice');
            data.serial_ports.forEach(port => {
                const option = document.createElement('option');
                option.value = port.device;
                option.textContent = `${port.device} - ${port.description}`;
                select.appendChild(option);
            });
            const settings = await getConfig();
            if (settings.serial_device) select.value = settings.serial_device;
        } catch (error) {
            toast.show(`${i18n.tr("Failed to retrieve serial port device list")}: ${error.message}`, 'error');
        }
    }

    async function loadLlmConfig() {
        try {
            const response = await fetch('/api/config/llm?t=' + Date.now());
            const config = await response.json();

            if (config.base_url) document.getElementById('baseUrl').value = config.base_url;
            if (config.api_key) document.getElementById('apiKey').value = config.api_key;
            if (config.model) document.getElementById('model').value = config.model;
        } catch (error) {
            console.error('Failed to load LLM config:', error);
        }
    }

    async function loadComfyUiConfig() {
        try {
            const response = await fetch('/api/config/comfyui?t=' + Date.now());
            const config = await response.json();
            if (config.url) document.getElementById('comfyUrl').value = config.url;
            const aspectValue = (config.aspect_ratio || 'portrait').toLowerCase();
            document.getElementById('aspectPortrait').checked = aspectValue === 'portrait';
            document.getElementById('aspectLandscape').checked = aspectValue === 'landscape';
            document.getElementById('aspectSquare').checked = aspectValue === 'square';
            const typeValue = (config.type || '').toLowerCase();
            if (typeValue === 'sdxl') {
                document.getElementById('comfyTypeSdxl').checked = true;
            } else if (typeValue === 'zit') {
                document.getElementById('comfyTypeZit').checked = true;
            }
            if (config.diffusion) document.getElementById('comfyDiffusion').value = config.diffusion;
            if (config.clip) document.getElementById('comfyClip').value = config.clip;
            if (config.vae) document.getElementById('comfyVae').value = config.vae;
        } catch (error) {
            console.error('Failed to load ComfyUI config:', error);
        }
    }

    // Joystick control
    document.getElementById('joystickControl').addEventListener('change', async function () {
        try {
            if (this.checked) {
                await fetchWithToast('/api/devices/joystick/start', { method: 'POST' },
                    'Joystick control started', 'Failed to start joystick control');
            } else {
                await fetchWithToast('/api/devices/joystick/stop', { method: 'POST' },
                    'Joystick control stopped', '');
            }
        } catch (error) {
            this.checked = !this.checked;
        }
    });

    // Update OSR settings
    document.getElementById('settingsForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const udpUrl = document.getElementById('udpUrl').value.trim();
        const serialDevice = document.getElementById('serialDevice').value;
        const params = new URLSearchParams();
        params.append('m', mode);
        if (udpUrl) params.append('u', udpUrl);
        if (serialDevice) params.append('s', serialDevice);
        try {
            await fetchWithToast(
                `/api/config?${params.toString()}`, { method: 'POST' },
                'Settings saved successfully', 'Failed to save settings');
            await updateJoystickCheckboxState(mode);
        } catch (error) { }
    });

    // Clear T2I cache
    document.getElementById('clear-t2i-cache')?.addEventListener('click', async function (e) {
        e.preventDefault();
        await fetchWithToast('/api/t2i/cache', {
            method: 'DELETE'
        }, 'Image cache cleared successfully', 'Failed to clear cache');
    });

    // Update LLM settings
    document.getElementById('llmConfigForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const baseUrl = document.getElementById('baseUrl').value.trim();
        const apiKey = document.getElementById('apiKey').value.trim();
        const model = document.getElementById('model').value.trim();
        const requestBody = {};
        if (baseUrl) requestBody.base_url = baseUrl;
        if (apiKey) requestBody.api_key = apiKey;
        if (model) requestBody.model = model;
        await fetchWithToast('/api/config/llm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        }, 'Settings saved successfully', 'Failed to save settings');
    });

    // Update ComfyUI settings
    document.getElementById('comfyuiConfigForm')?.addEventListener('submit', async function (e) {
        e.preventDefault();
        const url = document.getElementById('comfyUrl').value.trim();
        const aspectRatio = document.querySelector('input[name="aspectRatio"]:checked')?.value || 'portrait';
        const diffusion = document.getElementById('comfyDiffusion').value.trim();
        const clip = document.getElementById('comfyClip').value.trim();
        const vae = document.getElementById('comfyVae').value.trim();
        const type = document.querySelector('input[name="comfyType"]:checked')?.value || '';
        const requestBody = { url, type, diffusion, clip, vae, aspect_ratio: aspectRatio };
        await fetchWithToast('/api/config/comfyui', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        }, 'Settings saved successfully', 'Failed to save ComfyUI settings');
    });

    function toggleClipVaeFields() {
        const isSdxl = document.getElementById('comfyTypeSdxl').checked;
        const clipVaeGroups = document.querySelectorAll('.clip-vae-group');
        clipVaeGroups.forEach(group => {
            group.style.display = isSdxl ? 'none' : 'flex';
        });
    }

    document.getElementById('comfyTypeSdxl').addEventListener('change', toggleClipVaeFields);
    document.getElementById('comfyTypeZit').addEventListener('change', toggleClipVaeFields);
</script>

<script>
    // Unified handling of card click events
    document.addEventListener('click', (e) => {
        // Expand, hide cards
        if (e.target.closest('.card-header') &&
            !e.target.closest('.card-delete,.card-delete-confirm,.card-export')) {
            const header = e.target.closest('.card-header');
            const content = header.closest('.card-item').querySelector('.card-content');
            content.style.display = content.style.display === 'none' ? 'flex' : 'none';
        }

        // Update card
        if (e.target.closest('.card-save')) {
            e.preventDefault();
            e.stopPropagation();
            const btn = e.target.closest('.card-save');
            const cardItem = btn.closest('.card-item');
            const header = cardItem.querySelector('.card-header');
            const name = header.querySelector('.card-name').textContent;
            const prompt = cardItem.querySelector('.card-prompt').value;
            const content = cardItem.querySelector('.card-context').value;
            fetchWithToast(`/api/cards/${encodeURIComponent(name)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, content })
            }, 'Card saved successfully', 'Failed to save card')
                .then(() => {
                    const exportIcon = cardItem.querySelector('.card-export');
                    let cardData = { system_prompt: prompt };
                    if (content) cardData.context = [{ role: "user", content }];
                    const newCardData = { [name]: cardData };
                    exportIcon.setAttribute('data-card-data', JSON.stringify(newCardData));
                })
                .catch(() => { });
        }

        // Prepare to delete card
        if (e.target.closest('.card-delete')) {
            e.stopPropagation();
            const deleteBtn = e.target.closest('.card-delete');
            const cardItem = deleteBtn.closest('.card-item');
            const header = cardItem.querySelector('.card-header');
            const confirmBtn = header.querySelector('.card-delete-confirm');
            if (deleteBtn.dataset.timerId) clearTimeout(parseInt(deleteBtn.dataset.timerId));
            deleteBtn.style.display = 'none';
            confirmBtn.style.display = '';
            confirmBtn.focus();
            deleteBtn.dataset.timerId = '';
        }

        // Confirm delete card
        if (e.target.closest('.card-delete-confirm')) {
            e.stopPropagation();
            const confirmBtn = e.target.closest('.card-delete-confirm');
            const cardItem = confirmBtn.closest('.card-item');
            const header = cardItem.querySelector('.card-header');
            const deleteBtn = header.querySelector('.card-delete');
            const name = header.querySelector('.card-name').textContent;
            if (deleteBtn.dataset.timerId) {
                clearTimeout(parseInt(deleteBtn.dataset.timerId));
                deleteBtn.dataset.timerId = '';
            }
            fetchWithToast(`/api/cards/${encodeURIComponent(name)}`, {
                method: 'DELETE'
            }, '', 'Failed to delete card').then(() => {
                cardItem.remove();
            }).catch(() => { });
        }

        // Export card
        if (e.target.closest('.card-export')) {
            e.stopPropagation();
            const exportIcon = e.target.closest('.card-export');
            const cardItem = exportIcon.closest('.card-item');
            const header = cardItem.querySelector('.card-header');
            const name = header.querySelector('.card-name').textContent;
            const cardDataStr = exportIcon.getAttribute('data-card-data');
            if (cardDataStr) {
                try {
                    const cardData = JSON.parse(cardDataStr);
                    const blob = new Blob([JSON.stringify(cardData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${name}_${Date.now()}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (error) {
                    console.error('Failed to export card:', error);
                    toast.show(i18n.tr('Failed to export card'), 'error');
                }
            }
        }
    });

    // Card delete confirmation, timeout on blur
    document.addEventListener('focusout', (e) => {
        if (e.target.closest('.card-delete-confirm')) {
            const confirmBtn = e.target.closest('.card-delete-confirm');
            const cardItem = confirmBtn.closest('.card-item');
            const header = cardItem.querySelector('.card-header');
            const deleteBtn = header.querySelector('.card-delete');
            if (deleteBtn.dataset.timerId) clearTimeout(parseInt(deleteBtn.dataset.timerId));
            const timerId = setTimeout(() => {
                deleteBtn.style.display = '';
                confirmBtn.style.display = 'none';
                deleteBtn.dataset.timerId = '';
            }, 500); // 500ms
            deleteBtn.dataset.timerId = timerId.toString();
        }
    });

    document.addEventListener('focusin', (e) => {
        if (e.target.closest('.card-delete-confirm')) {
            const confirmBtn = e.target.closest('.card-delete-confirm');
            const cardItem = confirmBtn.closest('.card-item');
            const header = cardItem.querySelector('.card-header');
            const deleteBtn = header.querySelector('.card-delete');
            if (deleteBtn.dataset.timerId) {
                clearTimeout(parseInt(deleteBtn.dataset.timerId));
                deleteBtn.dataset.timerId = '';
            }
        }
    });

    // Create card
    const nameInput = document.getElementById('card-name-input');
    const newCardButton = document.getElementById('new-card-button');
    newCardButton.addEventListener('click', async () => {
        const name = nameInput.value.trim() || generateCardName();
        nameInput.value = '';
        await fetchWithToast('/api/cards', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, cardPrompt: '', content: '' })
        }, '', 'Failed to create card');
        try {
            const response = await fetch('/json/prompts/cards.json?t=' + Date.now());
            const cards = await response.json();
            renderCards(cards);
        } catch (error) {
            console.error('Failed to reload cards:', error);
        }
    });

    // Import card
    const importCardButton = document.getElementById('import-card-button');
    const importFileInput = document.createElement('input');
    importFileInput.type = 'file';
    importFileInput.accept = '.json';
    importFileInput.style.display = 'none';
    document.body.appendChild(importFileInput);

    importCardButton.addEventListener('click', () => {
        importFileInput.click();
    });

    importFileInput.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        try {
            const text = await file.text();
            const importedCards = JSON.parse(text);
            if (!isValidStructure(importedCards)) throw new Error('Invalid card structure');
            let successCount = 0;
            let errorCount = 0;
            for (const [cardName, cardData] of Object.entries(importedCards)) {
                try {
                    const prompt = cardData.system_prompt || '';
                    const content = cardData.context?.[0]?.content || '';
                    await fetchWithToast('/api/cards', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: cardName,
                            prompt: prompt,
                            content: content
                        })
                    }, '', 'Failed to import card');
                    successCount++;
                } catch (error) {
                    errorCount++;
                    console.error(`Failed to import card "${cardName}":`, error);
                }
            }
            importFileInput.value = '';
            try {
                const response = await fetch('/json/prompts/cards.json?t=' + Date.now());
                const cards = await response.json();
                renderCards(cards);
            } catch (error) {
                console.error('Failed to reload cards:', error);
            }
        } catch (error) {
            toast.show(`${i18n.tr("Failed to import card")}: ${i18n.tr(error.message)}`, 'error');
            importFileInput.value = '';
        }
    });

    // Card management functions
    function renderCards(cards) {
        const cardsList = document.getElementById('cards-list');
        cardsList.innerHTML = '';

        Object.entries(cards).forEach(([name, card]) => {
            const cardElem = document.createElement('div');
            cardElem.className = 'card-item';
            cardElem.innerHTML = `
<div class="card-header">
    <span class="card-name">${escapeHtml(name)}</span>
    <svg class="card-export"><use xlink:href="/img/icons.svg?v=140#icon-export"></use></svg>
    <svg class="card-delete" tabindex="0"><use xlink:href="/img/icons.svg?v=140#icon-clear"></use></svg>
    <svg class="card-delete-confirm" tabindex="0" style="display: none;"><use xlink:href="/img/icons.svg?v=140#icon-check"></use></svg>
</div>
<div class="card-content" style="display: none;">
    <div class="form-group">
        <label>${i18n.tr("Scenario & Personality")}</label>
        <textarea class="card-prompt" rows="3">${escapeHtml(card.system_prompt || '')}</textarea>
    </div>
    <div class="form-group">
        <label>${i18n.tr("Initial Messages")}</label>
        <textarea class="card-context" rows="3">${escapeHtml(card.context?.[0]?.content || '')}</textarea>
    </div>
    <button class="card-save">${i18n.tr("Save Settings")}</button>
</div>
            `;
            cardsList.prepend(cardElem);

            // Set export data for the card
            const exportIcon = cardElem.querySelector('.card-export');
            let cardData = { system_prompt: card.system_prompt || '' };
            if (card.context) cardData.context = card.context;
            exportIcon.setAttribute('data-card-data', JSON.stringify({ [name]: cardData }));
        });
    }

    async function loadAndRenderCards() {
        try {
            const response = await fetch('/json/prompts/cards.json?t=' + Date.now());
            const cards = await response.json();
            renderCards(cards);
        } catch (error) {
            console.error('Failed to load cards:', error);
        }
    }
</script>

<script>
    async function initQrCode() {
        try {
            const response = await fetch('/api/host/ip');
            const data = await response.json();
            const ip = data.ip || '127.0.0.1';
            new QRCode(document.getElementById('qr-code'), {
                text: `http://${ip}:${location.port}/`,
                width: 200,
                height: 200,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            document.getElementById('qr-url').textContent = `http://${ip}:${location.port}/`;
        } catch (error) {
            console.error('Failed to init QR code:', error);
        }
    }

    async function initApiDocs() {
        try {
            const response = await fetch('/docs/api.md');
            const markdown = await response.text();
            document.getElementById('api-doc-content').innerHTML = marked.parse(markdown);
        } catch (error) {
            console.error('Failed to load API docs:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await Promise.allSettled([
            loadSettings(),
            loadSerialDevices(),
            loadLlmConfig(),
            loadComfyUiConfig(),
            initQrCode(),
            initApiDocs(),
            loadAndRenderCards()
        ]);

        toggleClipVaeFields();
    });
</script>

</html>
