<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title" tr>Settings</title>
    <link rel="icon" type="image/x-icon" href="/img/logo.png">
    <link rel="stylesheet" href="/css/settings.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/marked.min.js"></script>
    <script src="/js/qrcode.min.js"></script>
</head>

<body>
    <select id="language-toggle">
        <option value="en">English</option>
        <option value="zh">中文</option>
    </select>

    <div class="tabs">
        <button class="tab-button active" data-tab="default">OSR</button>
        <button class="tab-button" data-tab="llm">LLM</button>
        <button class="tab-button" data-tab="qr">QR</button>
        <button class="tab-button" data-tab="api">API</button>
    </div>

    <div class="tab-content active" id="default-tab">
        <div class="container">
            <form id="settingsForm">
                <div class="form-group">
                    <label tr>Work Mode</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="modeUdp" name="mode" value="udp" checked>
                            <label for="modeUdp" tr>UDP Mode</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="modeSerial" name="mode" value="serial">
                            <label for="modeSerial" tr>Serial Mode</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="udpUrl" tr>UDP Address</label>
                    <input type="text" id="udpUrl" name="udpUrl" placeholder="192.168.4.1:8000">
                </div>

                <div class="form-group">
                    <label for="serialDevice" tr>Serial Device</label>
                    <select id="serialDevice" name="serialDevice">
                        <option value="" tr>Please select a serial device</option>
                    </select>
                </div>

                <div class="form-group">
                    <div class="radio-option">
                        <input type="checkbox" id="joystickControl" name="joystickControl" disabled>
                        <label for="joystickControl" tr>Joystick Control (for testing)</label>
                    </div>
                </div>

                <button type="submit" tr>Save Settings</button>
            </form>

            <div id="statusMessage"></div>
        </div>
    </div>

    <div class="tab-content" id="llm-tab">
        <div class="container" style="margin-bottom: 10px;">
            <form id="llmConfigForm">
                <div class="form-group">
                    <label for="baseUrl" tr>Base URL</label>
                    <input type="text" id="baseUrl" name="baseUrl" placeholder="http://124.0.0.1:11434/v1">
                </div>
                <div class="form-group">
                    <label for="apiKey" tr>API Key</label>
                    <input type="password" id="apiKey" name="apiKey" placeholder="sk-">
                </div>
                <div class="form-group">
                    <label for="model" tr>Model</label>
                    <input type="text" id="model" name="model" placeholder="qwen3:30b">
                </div>
                <button type="submit" tr>Save Settings</button>
            </form>
            <div id="llmStatusMessage"></div>
        </div>
        <a href="/" style="display: block; text-align: center;" tr>Go to Chat ></a>
    </div>

    <div class="tab-content" id="qr-tab" style="min-width: auto;">
        <div class="container">
            <div id="qr-code"></div>
            <div id="qr-url" style="user-select: text;"></div>
        </div>
    </div>

    <div class="tab-content" id="api-tab">
        <div class="container">
            <div id="api-doc-content" style="user-select: text;"></div>
        </div>
    </div>
</body>

<script>
    // i18n
    var currentLanguage = "en";
    var isLanguageLoading = false;
    document.addEventListener('DOMContentLoaded', async function () {
        i18n.setTr();
        currentLanguage = i18n.getBrowserLanguage();

        document.getElementById('language-toggle').addEventListener('change', async function () {
            if (isLanguageLoading) return;
            isLanguageLoading = true;

            currentLanguage = this.value;
            try {
                if (currentLanguage === "en") {
                    i18n.applyTr();
                } else {
                    await i18n.load(`/i18n/settings_${currentLanguage}.json?t=${Date.now()}`);
                    i18n.apply();
                }
            } catch (error) {
                console.error(error);
            } finally {
                isLanguageLoading = false;
            }
        });

        if (i18n.getBrowserLanguage() !== 'en') {
            const languageToggle = document.getElementById('language-toggle');
            languageToggle.value = i18n.getBrowserLanguage();
            languageToggle.dispatchEvent(new Event('change'));
        }
    });

    const tr = (text) => currentLanguage === "en" ? text : i18n.tr(text);
</script>

<script>
    document.addEventListener('DOMContentLoaded', async function () {
        // Get current settings
        try {
            const settingsResponse = await fetch('/api/config?t=' + Date.now());
            const settings = await settingsResponse.json();

            if (settings.udp_url) document.getElementById('udpUrl').value = settings.udp_url;
            if (settings.mode) document.querySelector(`input[name="mode"][value="${settings.mode}"]`).checked = true;

            // Set joystick control checkbox state
            const joystickCheckbox = document.getElementById('joystickControl');
            if (settings.mode === 'serial') {
                joystickCheckbox.disabled = false;
                try {
                    const joystickStatusResponse = await fetch('/api/devices/joystick');
                    const joystickStatus = await joystickStatusResponse.json();
                    joystickCheckbox.checked = joystickStatus.running;
                } catch (joystickError) {
                    console.error('Failed to get joystick status:', joystickError);
                    joystickCheckbox.checked = false;
                }
            } else {
                try {
                    await fetch('/api/devices/joystick/stop');
                }
                catch (error) { }
                joystickCheckbox.disabled = true;
                joystickCheckbox.checked = false;
            }
        } catch (error) {
            showStatus(`${tr("Failed to get current settings")}: ${error.message}`, 'error');
        }

        // Get serial port device list
        try {
            const serialResponse = await fetch('/api/devices/serial');
            const serialData = await serialResponse.json();

            const serialSelect = document.getElementById('serialDevice');
            serialData.serial_ports.forEach(port => {
                const option = document.createElement('option');
                option.value = port.device;
                option.textContent = `${port.device} - ${port.description}`;
                serialSelect.appendChild(option);
            });

            // Set currently selected serial device
            const settingsResponse = await fetch('/api/config?t=' + Date.now());
            const settings = await settingsResponse.json();
            if (settings.serial_device) {
                serialSelect.value = settings.serial_device;
            }
        } catch (error) {
            showStatus(`${tr("Failed to retrieve serial port device list")}: ${error.message}`, 'error');
        }
    });

    // Joystick control checkbox listener
    document.getElementById('joystickControl').addEventListener('change', async function () {
        try {
            if (this.checked) {
                const response = await fetch('/api/devices/joystick/start');
                if (!response.ok) {
                    this.checked = false;
                    const errorData = await response.json().catch(() => ({}));
                    showStatus(`${tr("Failed to start joystick control")}: ${errorData.detail || response.statusText}`, 'error');
                } else {
                    showStatus(tr("Joystick control started"), 'success');
                }
            } else {
                await fetch('/api/devices/joystick/stop');
                showStatus(tr("Joystick control stopped"), 'success');
            }
        } catch (error) {
            this.checked = !this.checked;
            showStatus(`${tr("Joystick control operation failed")}: ${error.message}`, 'error');
        }
    });

    // Form submission handling
    document.getElementById('settingsForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const mode = document.querySelector('input[name="mode"]:checked').value;
        const udpUrl = document.getElementById('udpUrl').value.trim();
        const serialDevice = document.getElementById('serialDevice').value;

        // Build parameters
        const params = new URLSearchParams();
        params.append('m', mode);
        if (udpUrl) params.append('u', udpUrl);
        if (serialDevice) params.append('s', serialDevice);

        try {
            const response = await fetch(`/api/config?${params.toString()}`, {
                method: 'POST'
            });

            if (response.ok) {
                const result = await response.json();
                showStatus(tr("Settings saved successfully"), 'success');

                // Update joystick control checkbox state
                const joystickCheckbox = document.getElementById('joystickControl');
                if (result.mode === 'serial') {
                    joystickCheckbox.disabled = false;
                } else {
                    joystickCheckbox.disabled = true;
                    joystickCheckbox.checked = false;
                    await fetch('/api/devices/joystick/stop');
                }
            } else {
                throw new Error(response.statusText);
            }
        } catch (error) {
            showStatus(`${tr("Failed to save settings")}: ${error.message}`, 'error');
        }
    });

    // Display status message
    function showStatus(message, type) {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.textContent = message;
        statusDiv.className = 'status ' + type;
        setTimeout(() => {
            statusDiv.textContent = '';
            statusDiv.className = '';
        }, 3000); // Clear after 3 seconds
    }
</script>

<script>
    // Tab switching
    document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', function () {
            const tabId = this.getAttribute('data-tab');
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(`${tabId}-tab`).classList.add('active');
        });
    });

    document.addEventListener('DOMContentLoaded', async function () {
        // Get current LLM configuration
        try {
            const llmConfigResponse = await fetch('/api/config/llm?t=' + Date.now());
            const llmConfig = await llmConfigResponse.json();

            if (llmConfig.base_url) document.getElementById('baseUrl').value = llmConfig.base_url;
            if (llmConfig.api_key) document.getElementById('apiKey').value = llmConfig.api_key;
            if (llmConfig.model) document.getElementById('model').value = llmConfig.model;
        } catch (error) { }
    });

    // Save LLM configuration
    document.getElementById('llmConfigForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const baseUrl = document.getElementById('baseUrl').value.trim();
        const apiKey = document.getElementById('apiKey').value.trim();
        const model = document.getElementById('model').value.trim();

        const requestBody = {};
        if (baseUrl) requestBody.base_url = baseUrl;
        if (apiKey) requestBody.api_key = apiKey;
        if (model) requestBody.model = model;

        try {
            const response = await fetch('/api/config/llm', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });

            if (response.ok) {
                const result = await response.json();
                showLlmStatus(tr("Settings saved successfully"), 'success');
            } else {
                throw new Error(response.statusText);
            }
        } catch (error) {
            showLlmStatus(`${tr("Failed to save settings")}: ${error.message}`, 'error');
        }
    });

    function showLlmStatus(message, type) {
        const statusDiv = document.getElementById('llmStatusMessage');
        statusDiv.textContent = message;
        statusDiv.className = 'status ' + type;
        setTimeout(() => {
            statusDiv.textContent = '';
            statusDiv.className = '';
        }, 3000);
    }
</script>

<script>
    // QR code
    const getHostIP = async () => {
        try {
            const response = await fetch('/api/host/ip');
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            return data.ip || '127.0.0.1';
        } catch (error) {
            return '127.0.0.1';
        }
    };

    document.addEventListener('DOMContentLoaded', async function () {
        try {
            ip = await getHostIP();
            const qrCode = new QRCode(document.getElementById('qr-code'), {
                text: `http://${ip}:${location.port}/`,
                width: 200,
                height: 200,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            document.getElementById('qr-url').textContent = `http://${ip}:${location.port}/`;
        } catch (error) { }
    });
</script>

<script>
    // API documentation
    const fetchMarkdown = async url => {
        try { const r = await fetch(url); return r.ok ? await r.text() : "" }
        catch { return "" }
    };

    document.addEventListener('DOMContentLoaded', async function () {
        document.getElementById('api-doc-content').innerHTML = marked.parse(await fetchMarkdown('/docs/api.md'));
    });
</script>

</html>
